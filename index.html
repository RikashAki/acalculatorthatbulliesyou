<!DOCTYPE html>
<html>
<head>
  <title>A Calculator That Bullies You</title>

  <style>
    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      width: 280px;
    }

    #display {
      background: #0f172a;
      color: white;
      border-radius: 12px;
      padding: 10px;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.05s;
    }

    #result {
      font-size: 26px;
      font-weight: bold;
      white-space: nowrap;
      overflow-x: auto;
    }

    #roast {
      font-size: 12px;
      opacity: 0.7;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    button:hover {
      background: #475569;
    }

    .operator { background: #f59e0b; color: black; }
    .equal { background: #22c55e; color: black; }
    .clear { background: #ef4444; color: white; }
  </style>
</head>

<body>

<div class="calculator">
  <div id="display">
    <div id="result"></div>
    <div id="roast"></div>
  </div>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator" onclick="press('/')">÷</button>
    <button class="operator" onclick="press('*')">×</button>
    <button class="operator" onclick="press('-')">−</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="operator" onclick="press('+')">+</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('.')">.</button>

    <button onclick="press('0')">0</button>
  </div>
</div>

<script>
let current = "";
let resultBox = document.getElementById("result");
let roastBox = document.getElementById("roast");
let display = document.getElementById("display");

let reactionHistory = [];
const HISTORY_LIMIT = 5;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.body.addEventListener("click", () => {
  if (audioCtx.state === "suspended") audioCtx.resume();
});

function playBeep(freq = 400, duration = 0.08, type = "square") {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = type;

  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shake(intensity = 6, time = 300) {
  let start = Date.now();

  function animate() {
    let t = Date.now() - start;
    if (t < time) {
      let x = (Math.random() - 0.5) * intensity;
      let y = (Math.random() - 0.5) * intensity;
      display.style.transform = `translate(${x}px, ${y}px)`;
      requestAnimationFrame(animate);
    } else {
      display.style.transform = "translate(0,0)";
    }
  }

  animate();
}

function glitch(text) {
  let i = 0;
  let interval = setInterval(() => {
    if (i < 5) {
      resultBox.innerText = Math.random() > 0.5
        ? text.split('').map(c => Math.random() > 0.5 ? c : '█').join('')
        : text;
      i++;
    } else {
      clearInterval(interval);
      resultBox.innerText = text;
    }
  }, 50);
}

function press(val) {
  current += val;
  resultBox.innerText = current;

  if (val === "+") playBeep(600);
  else if (val === "-") playBeep(300);
  else if (val === "*") playBeep(800);
  else if (val === "/") playBeep(200);
  else playBeep(350);
}

function clearDisplay() {
  current = "";
  resultBox.innerText = "";
  roastBox.innerText = "";
}

function calculate() {
  try {
    let result = eval(current);

    let nums = current.split(/[\+\-\*\/]/)
      .map(n => parseFloat(n))
      .filter(n => !isNaN(n));

    let allSame = nums.length > 1 && nums.every(n => n === nums[0]);
    let isSmall = nums.every(n => Math.abs(n) <= 10);

    let reactions = {
      roast: ["bro… this is basic math💀","you serious?? 😭","1st grade math","💀💀💀","nah be serious","omg..use your brain!","are you fr???","...im speechless.."],
      mid: ["okay…","not bad","you tried","kinda too easy","acceptable"],
      good: ["good ig...","valid 👍","nice one","solid","good work","meh kinda...easy.."],
      insane: ["BRO WHAT 😭","this is INSANE","HOW???","my brain died 💀","WHY ARE YOU COUNTING ALL OF THIS???😭","i wish i had this much money..."]
    };

    let type = "roast";

    if (nums.length === 1) type = isSmall ? "roast" : "mid";
    else if (allSame) type = "roast";
    else if (nums.length === 2) type = isSmall ? "roast" : "mid";
    else if (nums.length === 3) type = "mid";
    else if (nums.length >= 4) type = "good";

    if (Math.max(...nums.map(n => Math.abs(n))) >= 1000000) type = "insane";

    let list = reactions[type];

    let reaction;
    let attempts = 0;

    do {
      reaction = random(list);
      attempts++;
    } while (reactionHistory.includes(reaction) && attempts < 10);

    reactionHistory.push(reaction);
    if (reactionHistory.length > HISTORY_LIMIT) reactionHistory.shift();

    resultBox.innerText = result;
    roastBox.innerText = reaction;

    if (type === "roast") playBeep(200);
    else if (type === "mid") playBeep(350);
    else if (type === "good") playBeep(500);
    else if (type === "insane") {
      playBeep(120, 0.25, "sawtooth");
      shake(10, 400);
      glitch(result.toString());
    }

  } catch {
    playBeep(120, 0.3, "sawtooth");
    roastBox.innerText = "I AINT COUNTING ALL OF THAT😭";
  }
}
</script>

</body>
</html>
